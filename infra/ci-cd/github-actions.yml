# =============================================================================
# Avantika Language AI — GitHub Actions CI/CD Pipeline
# Triggered on push to main. Builds, tests, and deploys to Azure.
# =============================================================================

name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_SERVER }}
  RESOURCE_GROUP: avantika-rg
  ENVIRONMENT: prod

jobs:
  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: avantika
          POSTGRES_PASSWORD: avantika
          POSTGRES_DB: avantika_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://avantika:avantika@localhost:5432/avantika_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret
          AGENT_SERVICE_URL: http://localhost:8001
          AGENT_SERVICE_INTERNAL_KEY: test-key
        run: pytest tests/ -v --tb=short

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Frontend type check
        run: cd frontend && npm run type-check

  # ---------------------------------------------------------------------------
  # Build and push Docker images
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/avantika-backend:${{ github.sha }},${{ env.REGISTRY }}/avantika-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agents
        uses: docker/build-push-action@v5
        with:
          context: ./agents
          push: true
          tags: ${{ env.REGISTRY }}/avantika-agents:${{ github.sha }},${{ env.REGISTRY }}/avantika-agents:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ env.REGISTRY }}/avantika-frontend:${{ github.sha }},${{ env.REGISTRY }}/avantika-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to Azure Container Apps
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Agent Service
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: avantika-prod-agents
          imageToDeploy: ${{ env.REGISTRY }}/avantika-agents:${{ github.sha }}

      - name: Update Backend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: avantika-prod-backend
          imageToDeploy: ${{ env.REGISTRY }}/avantika-backend:${{ github.sha }}

      - name: Update Frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: avantika-prod-frontend
          imageToDeploy: ${{ env.REGISTRY }}/avantika-frontend:${{ github.sha }}
